function msToStr(ms) {
  if (ms == null || isNaN(ms)) return '—';
  const m  = Math.floor(ms / 60000);
  const s  = Math.floor((ms % 60000) / 1000);
  const cs = Math.floor((ms % 1000) / 10);
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')},${String(cs).padStart(2,'0')}`;
}
function parseToMs(str) {
  if (!str || str === 'NT') return null;
  const c = str.replace(',', '.');
  const p = c.split(':');
  return p.length === 2 ? (parseInt(p[0]) * 60 + parseFloat(p[1])) * 1000 : parseFloat(c) * 1000;
}
function calcVel(splitMs)  { return splitMs > 0 ? 50 / (splitMs / 1000) : null; }
function calcPace(splitMs) { return splitMs > 0 ? (splitMs / 1000) / 50 * 100 : null; }
function fmtVel(v)  { return v != null ? v.toFixed(2) + ' m/s' : '—'; }
function fmtPace(p) {
  if (p == null) return '—';
  const m = Math.floor(p / 60), s = (p % 60).toFixed(1);
  return `${m}:${String(s).padStart(4,'0')}/100m`;
}
function getLapLabels(metros) {
  const n = metros / 50;
  return Array.from({length: n}, (_, i) => {
    const m = (i + 1) * 50;
    if (m === metros)  return `${m}m — Llegada ★`;
    if (m % 100 === 0) return `${m}m — Vuelta`;
    return `${m}m`;
  });
}

//  CRONÓMETRO
// ═══════════════════════════════════════════
function initTimer(id) {
  if (!timers[id]) timers[id] = {interval:null, start:0, elapsed:0, laps:[], running:false, finished:false};
}
function startTimer(id) {
  initTimer(id);
  const t = timers[id];
  if (t.running || t.finished) return;
  t.running  = true;
  t.start    = Date.now() - t.elapsed;
  t.interval = setInterval(() => { t.elapsed = Date.now() - t.start; refreshDisplay(id); }, 10);
  updateBtns(id); updateIndicator(id);
}
function stopTimer(id, ms_exacto) {
  const t = timers[id];
  if (!t || !t.running) return;
  clearInterval(t.interval);
  t.running  = false;
  t.finished = true;
  t.elapsed  = ms_exacto != null ? ms_exacto : Date.now() - t.start;
  const cronoEl = document.getElementById('crono_'+id);
  if (cronoEl) cronoEl.classList.add('stopped');
  const tf = document.getElementById('tf_'+id);
  if (tf && !tf.value) { tf.value = msToStr(t.elapsed); tf.classList.add('filled'); }
  refreshDisplay(id); updateBtns(id); updateResultado(id);
}
function lapTimer(id) {
  const t = timers[id];
  if (!t || !t.running) return;
  const {prueba} = NAD_MAP[id] || {};
  const totalLaps = prueba ? prueba.lapsEsperados.length : 99;
  if (t.laps.length >= totalLaps) return;
  const now    = Date.now() - t.start;
  const prev   = t.laps.length ? t.laps[t.laps.length-1].abs : 0;
  const split  = now - prev;
  const isLast = (t.laps.length + 1) >= totalLaps;
  t.laps.push({ abs:now, split:split, vel:calcVel(split), pace:calcPace(split), isLast:isLast });
  renderLapsTable(id); updateDots(id); updateIndicator(id);
  if (isLast) stopTimer(id, now);
  updateBtns(id);
}
function resetTimer(id) {
  const t = timers[id]; if (!t) return;
  clearInterval(t.interval);
  timers[id] = {interval:null, start:0, elapsed:0, laps:[], running:false, finished:false};
  const tf = document.getElementById('tf_'+id);
  if (tf) { tf.value=''; tf.classList.remove('filled'); }
  const cronoEl = document.getElementById('crono_'+id);
  if (cronoEl) cronoEl.classList.remove('stopped');
  refreshDisplay(id); renderLapsTable(id); updateBtns(id); updateDots(id); updateIndicator(id); updateResultado(id);
}
function refreshDisplay(id) {
  const t  = timers[id]; if (!t) return;
  const el = document.getElementById('crono_main_'+id);
  if (el) el.textContent = msToStr(t.elapsed);
  const {prueba} = NAD_MAP[id] || {};
  const lapN = prueba ? prueba.lapsEsperados.length : 0;
  const lapCurEl = document.getElementById('crono_lap_cur_'+id);
  if (lapCurEl) {
    if (t.running && lapN > 0 && t.laps.length < lapN) {
      const prev = t.laps.length ? t.laps[t.laps.length-1].abs : 0;
      const cur  = (Date.now() - t.start) - prev;
      const ref  = prueba.lapsEsperados[t.laps.length] || '';
      lapCurEl.textContent = `${ref}: ${msToStr(cur)}  (${fmtVel(calcVel(cur))})`;
    } else lapCurEl.textContent = '';
  }
}
function updateIndicator(id) {
  const t  = timers[id] || {laps:[], running:false};
  const {prueba} = NAD_MAP[id] || {};
  if (!prueba) return;
  const totalLaps = prueba.lapsEsperados.length;
  const done      = t.laps.length;
  const el        = document.getElementById('lap_ind_'+id);
  const lapBtn    = document.getElementById('cb_lap_'+id);
  if (!el) return;
  if (!t.running && !t.finished) { el.textContent=''; return; }
  if (t.finished) {
    el.className = 'lap-indicator';
    el.textContent = `✓ Completado — ${done} / ${totalLaps} vueltas`;
    return;
  }
  const next = done + 1;
  const isNextLast = next === totalLaps;
  if (isNextLast) {
    el.className = 'lap-indicator last-lap';
    el.textContent = `⚡ ÚLTIMO 50m — toca y para el cronómetro`;
    if (lapBtn) lapBtn.classList.add('last-lap-btn');
  } else {
    el.className = 'lap-indicator';
    el.textContent = `Lap ${next} / ${totalLaps} — ${prueba.lapsEsperados[done] || ''}`;
    if (lapBtn) lapBtn.classList.remove('last-lap-btn');
  }
}
function updateDots(id) {
  const t = timers[id]; if (!t) return;
  const {prueba} = NAD_MAP[id] || {};
  if (!prueba) return;
  prueba.lapsEsperados.forEach((ref, i) => {
    const dot = document.getElementById(`dot_${id}_${i}`);
    if (!dot) return;
    const m = (i+1)*50;
    if (i < t.laps.length) {
      dot.className = 'lap-dot done';
      dot.innerHTML = `<span>✓</span><span class="dot-m">${m}m</span>`;
    } else if (i === t.laps.length && t.running) {
      const isLast = i === prueba.lapsEsperados.length - 1;
      dot.className = isLast ? 'lap-dot next-last' : 'lap-dot next';
      dot.innerHTML = `<span>${i+1}</span><span class="dot-m">${m}m</span>`;
    } else {
      dot.className = 'lap-dot';
      dot.innerHTML = `<span>${i+1}</span><span class="dot-m">${m}m</span>`;
    }
  });
}
function updateBtns(id) {
  const t = timers[id]; if (!t) return;
  const {prueba} = NAD_MAP[id] || {};
  const totalLaps = prueba ? prueba.lapsEsperados.length : 99;
  const g = k => document.getElementById(k+'_'+id);
  if (g('cb_start')) g('cb_start').disabled = t.running || t.finished;
  if (g('cb_stop'))  g('cb_stop').disabled  = !t.running;
  if (g('cb_lap'))   g('cb_lap').disabled   = !t.running || t.laps.length >= totalLaps;
  if (g('cb_reset')) g('cb_reset').disabled = t.running || (t.elapsed === 0 && !t.finished);
  const lapBtn = g('cb_lap');
  if (lapBtn && (!t.running || t.laps.length + 1 !== totalLaps)) lapBtn.classList.remove('last-lap-btn');
}

function calcMetLap(V, fb) {
  if (!V || isNaN(fb) || fb <= 0) return null;
  const LB = (V * 60) / fb;
  return { LB, nCiclos: (50 / LB) - 5, tCiclo: LB / V, IN: LB * V };
}
function setLapFB(id, lapIdx, val) {
  if (!resultados[id]) resultados[id] = {};
  if (!resultados[id].lapFBs) resultados[id].lapFBs = [];
  resultados[id].lapFBs[lapIdx] = val;
  renderLapsTable(id);
}

function renderLapsTable(id) {
  const t  = timers[id];
  const el = document.getElementById('laps_'+id);
  const {prueba} = NAD_MAP[id] || {};
  if (!el) return;
  if (!t || t.laps.length === 0) {
    el.innerHTML = `<div class="no-laps">Sin vueltas — presiona ◎ 50m en cada pared (el último 50m detiene el tiempo)</div>`;
    return;
  }
  const lapFBs = resultados[id]?.lapFBs || [];
  const rows = t.laps.map((l, i) => {
    const ref      = prueba?.lapsEsperados[i] || `Lap ${i+1}`;
    const isLast   = l.isLast;
    const trClass  = isLast ? 'last-row' : '';
    const refClass = isLast ? 'td-ref is-final' : 'td-ref';
    const fbVal    = lapFBs[i] || '';
    const met      = fbVal ? calcMetLap(l.vel, parseFloat(fbVal)) : null;
    const metContent = met
      ? `<table class="lap-met-table">
          <tr>
            <td class="lap-met-sigla">LB</td><td class="lap-met-val">${met.LB.toFixed(2)}</td><td class="lap-met-unit">m/ciclo</td>
            <td style="width:12px"></td>
            <td class="lap-met-sigla">N°Ciclos</td><td class="lap-met-val">${met.nCiclos.toFixed(1)}</td><td class="lap-met-unit"></td>
            <td style="width:12px"></td>
            <td class="lap-met-sigla">T(Ciclo)</td><td class="lap-met-val">${met.tCiclo.toFixed(2)}</td><td class="lap-met-unit">s</td>
            <td style="width:12px"></td>
            <td class="lap-met-sigla">IN</td><td class="lap-met-val">${met.IN.toFixed(3)}</td><td class="lap-met-unit">m²/s</td>
          </tr>
        </table>`
      : `<span class="lap-met-empty">Ingresa FB para calcular métricas de este 50m</span>`;
    return `<tr class="${trClass}">
      <td class="td-n">${i+1}</td>
      <td class="${refClass}">${ref}</td>
      <td class="td-spl">${msToStr(l.split)}</td>
      <td class="td-acum">${msToStr(l.abs)}</td>
      <td class="td-vel">${fmtVel(l.vel)}</td>
      <td class="td-pace">${fmtPace(l.pace)}</td>
    </tr>
    <tr class="met-lap-row">
      <td colspan="6">
        <div class="lap-met-box">
          <div class="lap-fb-group">
            <span class="lap-fb-label">FB</span>
            <input class="fb-lap-input" type="number" min="1" max="120" step="0.1"
              placeholder="—" value="${fbVal}"
              onchange="setLapFB('${id}',${i},this.value)" />
            <span class="lap-fb-unit">braz/min</span>
          </div>
          ${metContent}
        </div>
      </td>
    </tr>`;
  }).join('');
  el.innerHTML = `
    <table class="laps-tbl">
      <thead><tr>
        <th>#</th><th>Referencia</th><th>Split (50m)</th>
        <th>Acumulado</th><th>Velocidad</th><th>Pace /100m</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function updateResultado(id) {
  const tf   = document.getElementById('tf_'+id);
  const nota = document.getElementById('nota_'+id);
  const t    = timers[id] || {laps:[]};
  const lapFBs = resultados[id]?.lapFBs || [];
  resultados[id] = {
    tiempoFinal: tf ? tf.value : '',
    laps: t.laps.map(l => ({
      abs:   msToStr(l.abs),
      split: msToStr(l.split),
      vel:   l.vel  ? l.vel.toFixed(3)  : '',
      pace:  l.pace ? l.pace.toFixed(2) : '',
      isLast: l.isLast || false
    })),
    nota:   nota ? nota.value : '',
    lapFBs: lapFBs
  };
  const {nad, prueba} = NAD_MAP[id] || {};
  const tag    = document.getElementById('mejoria_'+id);
  const prevEl = document.getElementById('tf_preview_'+id);
  const velEl  = document.getElementById('vel_final_'+id);
  if (prevEl) prevEl.textContent = tf?.value || '';
  if (tag && nad) {
    const ins = parseToMs(nad.tiempoIns);
    const fin = parseToMs(tf?.value);
    if (ins && fin) {
      const d = fin - ins;
      tag.className = 'mejoria-tag ' + (d < 0 ? 'mejora' : (d === 0 ? 'igual' : 'peor'));
      tag.textContent = d < 0 ? `▼ Mejora ${msToStr(Math.abs(d))}` : (d === 0 ? '= Igual' : `▲ +${msToStr(d)}`);
    } else tag.className = 'mejoria-tag';
  }
  if (velEl && tf?.value && prueba) {
    const fin = parseToMs(tf.value);
    if (fin) {
      const vm = prueba.metros / (fin / 1000);
      const pm = calcPace((fin / prueba.metros) * 50);
      velEl.innerHTML = `Vel. media: ${vm.toFixed(2)} m/s<br>Pace: ${fmtPace(pm)}`;
    }
  } else if (velEl) velEl.textContent = '';
  document.getElementById('sw_hdr_'+id)?.classList.toggle('has-result', !!(tf?.value));
  actualizarStats();
}

function actualizarStats() {
  let ct=0, mej=0;
  ALL_PRUEBAS.forEach(p => p.nadadores.forEach(n => {
    const r = resultados[n.id];
    if (r?.tiempoFinal) { ct++; const ins=parseToMs(n.tiempoIns), fin=parseToMs(r.tiempoFinal); if(ins&&fin&&fin<ins)mej++; }
  }));
  document.getElementById('statConTiempo').textContent = ct;
  document.getElementById('statMejoras').textContent   = mej;
}

// ═══════════════════════════════════════════
//  ACORDEÓN + TABS
// ═══════════════════════════════════════════
function togglePrueba(eid) {
  document.getElementById('list_'+eid)?.classList.toggle('collapsed');
  document.getElementById('chev_'+eid)?.classList.toggle('open');
}
function toggleSwimmer(nid) {
  const panel = document.getElementById('panel_'+nid);
  const open  = panel?.classList.toggle('open');
  document.getElementById('sw_chev_'+nid)?.classList.toggle('open', open);
  if (open) { initTimer(nid); updateBtns(nid); renderLapsTable(nid); updateDots(nid); updateIndicator(nid); }
}
function showEtapa(n) {
  etapaActiva = n;
  document.getElementById('etapa1_container').style.display = n===1 ? 'block' : 'none';
  document.getElementById('etapa2_container').style.display = n===2 ? 'block' : 'none';
  document.getElementById('tab1').classList.toggle('active', n===1);
  document.getElementById('tab2').classList.toggle('active', n===2);
  allExpanded = false;
  document.getElementById('btnExpandAll').textContent = '⊞ Expandir todo';
}
function toggleAll() {
  allExpanded = !allExpanded;
  const etapa = ETAPAS.find(e => e.id === etapaActiva);
  if (!etapa) return;
  etapa.pruebas.forEach(p => {
    const uniqId = `${etapaActiva}_${p.id}`;
    document.getElementById('list_'+uniqId)?.classList.toggle('collapsed', !allExpanded);
    document.getElementById('chev_'+uniqId)?.classList.toggle('open', allExpanded);
    p.nadadores.forEach(n => {
      const panel = document.getElementById('panel_'+n.id);
      const sch   = document.getElementById('sw_chev_'+n.id);
      if (allExpanded) {
        panel?.classList.add('open'); sch?.classList.add('open');
        initTimer(n.id); updateBtns(n.id); renderLapsTable(n.id); updateDots(n.id); updateIndicator(n.id);
      } else {
        panel?.classList.remove('open'); sch?.classList.remove('open');
      }
    });
  });
  document.getElementById('btnExpandAll').textContent = allExpanded ? '⊟ Colapsar todo' : '⊞ Expandir todo';
}

// ═══════════════════════════════════════════
//  GUARDAR / LIMPIAR
// ═══════════════════════════════════════════
function guardarResultados() {
  ALL_PRUEBAS.forEach(p => p.nadadores.forEach(n => updateResultado(n.id)));
  guardarLS();
  const m = document.getElementById('saveMsg');
  m.classList.add('show'); setTimeout(() => m.classList.remove('show'), 2500);
}
function limpiarTodo() {
  if (!confirm('¿Borrar TODOS los tiempos y laps registrados?')) return;
  ALL_PRUEBAS.forEach(p => p.nadadores.forEach(n => {
    clearInterval(timers[n.id]?.interval); timers[n.id]=null; delete resultados[n.id];
  }));
  localStorage.removeItem('cduss_jde2026_v1');
  renderTodo();
}

// ═══════════════════════════════════════════
//  EXPORTAR EXCEL
// ═══════════════════════════════════════════
function metBio(vel, fb) {
  const V = parseFloat(vel), f = parseFloat(fb);
  if (!V || !f || f <= 0) return ['','','','',''];
  const LB = (V * 60) / f;
  return [f.toFixed(1), LB.toFixed(2), ((50/LB)-5).toFixed(2), (LB/V).toFixed(2), (LB*V).toFixed(3)];
}
function exportarExcel() {
  guardarResultados();
  const wb = XLSX.utils.book_new();
  const maxLaps = Math.max(...ALL_PRUEBAS.map(p => p.lapsEsperados.length));
  const lapHdrsR = Array.from({length:maxLaps}, (_,i) => [`Split L${i+1}`,`Acum. L${i+1}`,`Vel. L${i+1} m/s`,`Pace L${i+1}`]).flat();

  // ── Hoja Resumen ──
  const resumen = [
    [TORNEO.nombre],[TORNEO.fecha],[`Club: ${TORNEO.club}  |  Generado: ${new Date().toLocaleString('es-CL')}`],[],
    ['Sesión','#Prueba','Prueba','Nadador','Edad','Colegio','Serie','Pista','Hora',
     'T.Inscripción','T.Final','Vel.Media m/s','Pace Media','Mejoría','Dif.(s)',
     ...lapHdrsR,'Observación']
  ];
  ETAPAS.forEach(e => {
    e.pruebas.forEach(p => {
      p.nadadores.forEach(n => {
        const r=resultados[n.id]||{}, tf=r.tiempoFinal||'', laps=r.laps||[];
        const ins=parseToMs(n.tiempoIns), fin=parseToMs(tf);
        let mej='',diff='',vm='',pm='';
        if(fin){vm=(p.metros/(fin/1000)).toFixed(3);pm=fmtPace(calcPace((fin/p.metros)*50));}
        if(ins&&fin){const d=(fin-ins)/1000;mej=d<0?'Mejora':(d===0?'Igual':'Sin mejora');diff=d.toFixed(2);}
        const lapCols=Array.from({length:maxLaps},(_,i)=>[laps[i]?.split||'',laps[i]?.abs||'',laps[i]?.vel||'',laps[i]?.pace||'']).flat();
        resumen.push([e.titulo.split('—')[0].trim(),'#'+p.id,p.nombre,n.nombre,n.edad,n.colegio,n.serie,n.pista,n.horaInicio,n.tiempoIns,tf,vm,pm,mej,diff,...lapCols,r.nota||'']);
      });
      resumen.push([]);
    });
  });
  const ws1=XLSX.utils.aoa_to_sheet(resumen);
  XLSX.utils.book_append_sheet(wb, ws1, 'Resumen');

  // ── Hojas por etapa (con métricas FB) ──
  ETAPAS.forEach(e => {
    const shData = [
      [e.titulo],[`${TORNEO.nombre} | Club: ${TORNEO.club}`],[`Generado: ${new Date().toLocaleString('es-CL')}`],[]
    ];
    e.pruebas.forEach(p => {
      const lapHdrs = p.lapsEsperados.flatMap((ref,i) => [
        `Split\n${ref}`,`Acum.\nL${i+1}`,`Vel.\nm/s`,`Pace\n/100m`,
        `FB\nbraz/min`,`LB\nm/ciclo`,`N°Ciclos`,`T(Ciclo)\ns`,`IN\nm²/s`
      ]);
      shData.push([`PRUEBA #${p.id} – ${p.nombre} · ${p.metros}m · ${p.lapsEsperados.length}×50m`]);
      shData.push(['Nadador','Edad','Colegio','Pista','T.Inscripción','T.Final','Vel.Media','Mejoría','Dif.(s)',...lapHdrs,'Obs.']);
      p.nadadores.forEach(n => {
        const r=resultados[n.id]||{}, tf=r.tiempoFinal||'', laps=r.laps||[], lapFBs=r.lapFBs||[];
        const ins=parseToMs(n.tiempoIns), fin=parseToMs(tf);
        let mej='',diff='',vm='';
        if(fin) vm=(p.metros/(fin/1000)).toFixed(3);
        if(ins&&fin){const d=(fin-ins)/1000;mej=d<0?'Mejora':(d===0?'Igual':'Sin mejora');diff=d.toFixed(2);}
        const lapCols=p.lapsEsperados.flatMap((_,i)=>[
          laps[i]?.split||'',laps[i]?.abs||'',laps[i]?.vel||'',laps[i]?.pace||'',
          ...metBio(laps[i]?.vel, lapFBs[i])
        ]);
        shData.push([n.nombre,n.edad,n.colegio,n.pista,n.tiempoIns,tf,vm,mej,diff,...lapCols,r.nota||'']);
      });
      shData.push([]);
    });
    const wsE=XLSX.utils.aoa_to_sheet(shData);
    XLSX.utils.book_append_sheet(wb, wsE, e.id===1?'Sesión AM':'Sesión PM');
  });

  // ── Hoja Métricas Brazada ──
  const metSheet = [
    [TORNEO.nombre],[`Métricas de Brazada por 50m — Generado: ${new Date().toLocaleString('es-CL')}`],[],
    ['Sesión','Prueba','Nadador','Colegio','T.Final','50m','Referencia','Split','Vel. (m/s)','FB (braz/min)','LB (m/ciclo)','N° Ciclos','T(Ciclo) (s)','IN (m²/s)']
  ];
  ETAPAS.forEach(e => {
    e.pruebas.forEach(p => {
      p.nadadores.forEach(n => {
        const r=resultados[n.id]||{}, laps=r.laps||[], lapFBs=r.lapFBs||[];
        laps.forEach((l,i) => {
          const ref=p.lapsEsperados[i]||`L${i+1}`;
          const bio=metBio(l.vel, lapFBs[i]);
          metSheet.push([e.id===1?'AM':'PM',`#${p.id} ${p.metros}m ${p.estilo}`,n.nombre,n.colegio,r.tiempoFinal||'',
            `${(i+1)*50}m`,ref,l.split||'',l.vel||'',bio[0],bio[1],bio[2],bio[3],bio[4]]);
        });
      });
    });
    metSheet.push([]);
  });
  const wsM=XLSX.utils.aoa_to_sheet(metSheet);
  XLSX.utils.book_append_sheet(wb, wsM, 'Métricas Brazada');

  XLSX.writeFile(wb, `JDE2026_RM_CDUSS_Tiempos.xlsx`);
}

// ═══════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════
function renderSwimmer(nad, prueba) {
  const r     = resultados[nad.id] || {};
  const tfVal = r.tiempoFinal || '';
  const hasTf = !!tfVal;
  const lapN  = prueba.lapsEsperados.length;
  const badgeIns = nad.tiempoIns === 'NT'
    ? `<span class="badge badge-nt">NT</span>`
    : `<span class="badge badge-time">${nad.tiempoIns}</span>`;
  const dots = Array.from({length:lapN}, (_,i) => {
    const m = (i+1)*50;
    return `<div class="lap-dot" id="dot_${nad.id}_${i}"><span>${i+1}</span><span class="dot-m">${m}m</span></div>`;
  }).join('');

  return `
  <div class="swimmer-row">
    <div class="swimmer-header ${hasTf?'has-result':''}" id="sw_hdr_${nad.id}" onclick="toggleSwimmer('${nad.id}')">
      <span class="sw-nombre">${nad.nombre}</span>
      <span class="sw-edad">${nad.edad} años</span>
      <span class="sw-badges">
        <span class="badge badge-serie">${nad.serie}</span>
        <span class="badge badge-pista">Pista ${nad.pista}</span>
        <span class="badge badge-colegio">${nad.colegio}</span>
        <span class="sw-hora">⏱ ${nad.horaInicio}</span>
      </span>
      <span class="sw-ins">
        <span class="sw-ins-lbl">Inscripción:</span>${badgeIns}
        <span class="sw-tf-preview" id="tf_preview_${nad.id}">${tfVal}</span>
      </span>
      <span class="sw-chevron" id="sw_chev_${nad.id}">▼</span>
    </div>

    <div class="swimmer-panel" id="panel_${nad.id}">
      <div class="panel-grid">

        <!-- COLUMNA IZQUIERDA: cronómetro + resultado -->
        <div class="left-col">
          <div class="crono-box">
            <div class="crono" id="crono_${nad.id}">
              <div class="crono-main" id="crono_main_${nad.id}">00:00,00</div>
              <div class="crono-lap-cur" id="crono_lap_cur_${nad.id}"></div>
              <div class="lap-progress">${dots}</div>
              <div class="lap-indicator" id="lap_ind_${nad.id}"></div>
              <div class="crono-btns">
                <button class="cb cb-start" id="cb_start_${nad.id}" onclick="startTimer('${nad.id}')">▶ Iniciar</button>
                <button class="cb cb-stop"  id="cb_stop_${nad.id}"  onclick="stopTimer('${nad.id}')"  disabled>■ Parar</button>
                <button class="cb cb-lap"   id="cb_lap_${nad.id}"   onclick="lapTimer('${nad.id}')"   disabled>◎ 50m</button>
                <button class="cb cb-reset" id="cb_reset_${nad.id}" onclick="resetTimer('${nad.id}')" disabled>↺ Reset</button>
              </div>
            </div>
            <div class="crono-hint">▶ Salida → ◎ 50m en cada pared → el <strong>último ◎ 50m</strong> detiene el cronómetro</div>
          </div>

          <div class="result-box">
            <div class="field-group">
              <span class="field-label">Tiempo Final</span>
              <input class="tf-input ${hasTf?'filled':''}" id="tf_${nad.id}"
                     type="text" placeholder="00:00,00" value="${tfVal}"
                     oninput="this.classList.toggle('filled',this.value.length>0); updateResultado('${nad.id}')" />
              <div class="vel-final" id="vel_final_${nad.id}"></div>
              <span class="mejoria-tag" id="mejoria_${nad.id}"></span>
            </div>
            <div class="field-group">
              <span class="field-label">Observación</span>
              <input class="nota-input" id="nota_${nad.id}" type="text"
                     placeholder="Descalif., falsa salida…"
                     value="${r.nota||''}"
                     oninput="updateResultado('${nad.id}')" />
            </div>
          </div>
        </div>

        <!-- COLUMNA DERECHA: tabla laps + métricas -->
        <div class="right-col">
          <div class="laps-box">
            <div class="laps-title">Parciales de 50m — ${lapN} vuelta${lapN>1?'s':''} · ${prueba.metros}m ${prueba.estilo}</div>
            <div id="laps_${nad.id}">
              <div class="no-laps">Sin vueltas — presiona ◎ 50m en cada pared (el último 50m detiene el tiempo)</div>
            </div>
            <div class="legend">
              <span><span class="dot" style="background:#fc8181"></span> Split 50m</span>
              <span><span class="dot" style="background:#90cdf4"></span> Acumulado</span>
              <span><span class="dot" style="background:#fbd38d"></span> Velocidad m/s</span>
              <span><span class="dot" style="background:#b794f4"></span> Pace /100m</span>
              <span><span class="dot" style="background:#f6ad55"></span> Último 50m = T.Final</span>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>`;
}

function renderPrueba(prueba, etapaId) {
  const lapN  = prueba.lapsEsperados.length;
  const uniqId = `${etapaId}_${prueba.id}`;
  return `
  <div class="event-section">
    <div class="event-header" onclick="togglePrueba('${uniqId}')">
      <div class="event-header-inner">
        <span class="event-num">#${prueba.id}</span>
        <span class="event-name">${prueba.nombre}</span>
        <span class="event-meta">
          <span class="event-dist">${prueba.metros}m · ${lapN}×50m</span>
          <span class="event-count">${prueba.nadadores.length} entrada${prueba.nadadores.length>1?'s':''}</span>
          <span class="chevron" id="chev_${uniqId}">▼</span>
        </span>
      </div>
    </div>
    <div class="swimmers-list collapsed" id="list_${uniqId}">
      ${prueba.nadadores.map(n => renderSwimmer(n, prueba)).join('')}
    </div>
  </div>`;
}

function renderTodo() {
  ETAPAS.forEach(e => {
    const container = document.getElementById(`etapa${e.id}_container`);
    container.innerHTML = e.pruebas.map(p => renderPrueba(p, e.id)).join('');
  });
  ALL_PRUEBAS.forEach(p => p.nadadores.forEach(n => {
    if (resultados[n.id]?.tiempoFinal) updateResultado(n.id);
  }));
  actualizarStats();
}

// INIT
cargarLS();
renderTodo();
</script>
</body>
</html>
